version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - documind-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: documind-chromadb
    ports:
      - "8200:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documind-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: documind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - documind-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - documind-network
    restart: unless-stopped

networks:
  documind-network:
    driver: bridge

volumes:
  ollama_models:
